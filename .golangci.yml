version: "2"

run:
  timeout: 5m

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unparam
    - sqlclosecheck
    - unconvert
    - noctx
    - gocritic
    - dogsled
    - nolintlint
    - misspell
    - prealloc
    - gocognit
    - gosec
  settings:
    gocritic:
      disabled-checks:
        - commentFormatting
    gocognit:
      # minimal code complexity to report (we recommend 10-20, using 40 for now)
      min-complexity: 40
    errcheck:
      check-blank: true
      check-type-assertions: true
  exclusions:
    # Exclude test files from linting
    paths:
      - ".*_test\\.go$"
    rules:
      - linters:
          - staticcheck
        text: "SA1019:"
      - linters:
          - gosec
        text: "G402:"
      - linters:
          - gocritic
        text: "singleCaseSwitch:"

severity:
  default: info
